name: Deploy SlimWeb MCP

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PROJECT_ID: webless-489821
  REGION: asia-east1
  SERVICE: slimweb-mcp
  ARTIFACT_REPOSITORY: cloud-run-source-deploy
  CLOUD_SQL_INSTANCE: webless-489821:asia-east1:webless-db
  VPC_CONNECTOR: webless-connector

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${SERVICE}:${GITHUB_SHA}"
          docker build -t "${IMAGE}" .

      - name: Push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${SERVICE}:${GITHUB_SHA}"
          docker push "${IMAGE}"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${SERVICE}:${GITHUB_SHA}"
          gcloud run deploy "${SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --platform=managed \
            --image="${IMAGE}" \
            --add-cloudsql-instances="${CLOUD_SQL_INSTANCE}" \
            --vpc-connector="${VPC_CONNECTOR}" \
            --vpc-egress=all-traffic \
            --timeout=900 \
            --set-env-vars="NODE_ENV=production,PUBLIC_BASE_URL=https://slimweb-mcp-aakwcbp2ca-de.a.run.app,SLIMWEB_CLIENT_MCP_BASE_URL=https://slimweb-client-mcp-aakwcbp2ca-de.a.run.app,GOOGLE_CLIENT_ID=27587628711-upin8ch154kqrl88k41978q660oc0pbg.apps.googleusercontent.com,DB_HOST=${{ secrets.DB_HOST }},DB_PORT=${{ secrets.DB_PORT }},DB_DATABASE=${{ secrets.DB_DATABASE }},DB_USERNAME=${{ secrets.DB_USERNAME }},DB_PASSWORD=${{ secrets.DB_PASSWORD }},DB_SSLMODE=${{ secrets.DB_SSLMODE }},MCP_SESSION_SECRET=${{ secrets.MCP_SESSION_SECRET }},WEBLESS_MCP_SECRET=${{ secrets.WEBLESS_MCP_SECRET }},WEBLESS_STORAGE_DRIVER=gcs,GCS_BUCKET=webless_bucket,WEBLESS_PUBLIC_BASE_URL=https://slimweb.tw,WEBLESS_APP_BASE_URL=https://webless-aakwcbp2ca-de.a.run.app" \
            --allow-unauthenticated \
            --quiet
